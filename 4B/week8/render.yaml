services:
  - type: web
    name: jkyog-whatsapp-bot-week8
    env: python
    plan: free
    buildCommand: |
      pip install --upgrade pip
      pip install -r 4B/week8/requirements.txt
    startCommand: |
      uvicorn 4B.week8.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0

